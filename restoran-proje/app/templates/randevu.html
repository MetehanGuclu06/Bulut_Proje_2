<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervasyon — Ember & Oak</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --dark: #1a1510;
            --gold: #c9a84c;
            --text: #2d2418;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }
        nav {
            padding: 2rem 4rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(201,168,76,0.15);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem; color: var(--gold); letter-spacing: 0.15em;
            text-decoration: none;
        }
        .back-link {
            font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--cream); text-decoration: none; opacity: 0.6;
            transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 1; }

        .page {
            max-width: 600px; margin: 6rem auto; padding: 0 2rem;
            animation: fadeUp 0.8s ease both;
        }
        .page-label {
            font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 1rem;
        }
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem; font-weight: 300; line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .page-title em { color: var(--gold); font-style: italic; }
        .page-sub { opacity: 0.5; font-size: 0.8rem; margin-bottom: 3rem; line-height: 1.7; }

        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 0.6rem; opacity: 0.8;
        }
        input, select, textarea {
            width: 100%; padding: 1rem 0;
            background: transparent;
            border: none; border-bottom: 1px solid rgba(201,168,76,0.3);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.9rem;
            outline: none; transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
            border-bottom-color: var(--gold);
        }
        select option { background: var(--dark); }
        textarea { resize: none; height: 80px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        .submit-btn {
            width: 100%; margin-top: 2.5rem;
            padding: 1.2rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
            cursor: pointer; transition: all 0.4s;
        }
        .submit-btn:hover { background: var(--gold); color: var(--dark); }

        .error-msg {
            background: rgba(180,50,50,0.2);
            border: 1px solid rgba(180,50,50,0.4);
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            font-size: 0.8rem; color: #e88;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            nav { padding: 1.5rem 2rem; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Ember & Oak</a>
        <a href="/" class="back-link">← Ana Sayfa</a>
    </nav>

    <div class="page">
        <p class="page-label">Rezervasyon</p>
        <h1 class="page-title">Masanızı<br><em>Ayırtın</em></h1>
        <p class="page-sub">Özel bir akşam için yerinizi şimdiden garantileyin.<br>En az 2 saat öncesinden rezervasyon yapmanızı öneririz.</p>

        {% if hata %}
        <div class="error-msg">Bir hata oluştu: {{ hata }}</div>
        {% endif %}

        <form method="POST" action="/randevu">
            <div class="form-row">
                <div class="form-group">
                    <label for="ad_soyad">Ad Soyad</label>
                    <input type="text" id="ad_soyad" name="ad_soyad" required placeholder="Adınız Soyadınız">
                </div>
                <div class="form-group">
                    <label for="telefon">Telefon</label>
                    <input type="tel" id="telefon" name="telefon" required placeholder="+90 555 000 00 00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tarih">Tarih</label>
                    <input type="date" id="tarih" name="tarih" required>
                </div>
                <div class="form-group">
                    <label for="saat">Saat</label>
                    <select id="saat" name="saat" required>
                        <option value="">Seçiniz</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="14:00">14:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                        <option value="21:00">21:00</option>
                        <option value="22:00">22:00</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="kisi_sayisi">Kişi Sayısı</label>
                <select id="kisi_sayisi" name="kisi_sayisi" required>
                    <option value="">Seçiniz</option>
                    <option value="1">1 Kişi</option>
                    <option value="2">2 Kişi</option>
                    <option value="3">3 Kişi</option>
                    <option value="4">4 Kişi</option>
                    <option value="5">5 Kişi</option>
                    <option value="6">6 Kişi</option>
                    <option value="7">7 Kişi</option>
                    <option value="8">8+ Kişi</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notlar">Özel İstek / Not (Opsiyonel)</label>
                <textarea id="notlar" name="notlar" placeholder="Doğum günü, alerji bilgisi, özel istek..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Rezervasyonu Onayla</button>
        </form>
    </div>
</body>
</html>
