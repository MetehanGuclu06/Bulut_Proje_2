<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervasyon Onaylandı — Ember & Oak</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #f5f0e8; --dark: #1a1510; --gold: #c9a84c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark); color: var(--cream);
            font-family: 'Montserrat', sans-serif; font-weight: 300;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            text-align: center; padding: 4rem;
            animation: fadeUp 1s ease both;
        }
        .icon { font-size: 3rem; margin-bottom: 2rem; animation: pulse 2s ease infinite; }
        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem; font-weight: 300; margin-bottom: 1rem;
        }
        .title em { color: var(--gold); font-style: italic; }
        p { opacity: 0.6; font-size: 0.85rem; line-height: 1.8; margin-bottom: 3rem; }
        .btn {
            display: inline-block; padding: 1rem 3rem;
            border: 1px solid var(--gold); color: var(--gold);
            text-decoration: none; font-size: 0.7rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            transition: all 0.4s;
        }
        .btn:hover { background: var(--gold); color: var(--dark); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">◆</div>
        <h1 class="title">Rezervasyonunuz<br><em>Onaylandı</em></h1>
        <p>Sizi aramızda görmekten mutluluk duyacağız.<br>Herhangi bir değişiklik için lütfen bizi arayın.</p>
        <a href="/" class="btn">Ana Sayfaya Dön</a>
    </div>
</body>
</html>
